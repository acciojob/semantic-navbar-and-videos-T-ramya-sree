<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic Navbar and Videos</title>

    <style>
        nav {
            background-color: #222;
            padding: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .videos {
            text-align: center;
        }

        video {
            margin: 10px;
            width: 320px;
            height: 240px;
        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About us</a></li>
        <li><a href="#">Contact us</a></li>
    </ul>
</nav>

<!-- ================= HEADING ================= -->
<h2>3 random videos</h2>

<!-- ================= VIDEOS ================= -->
<div class="videos">

    <video controls>
        <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4" type="video/mp4">
    </video>

</div>

</body>
</html>
